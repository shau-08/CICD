name: Reusable CD Logic
on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to use. Leave empty to auto-generate <repo>-<branch>-<date>-<sha>.'
        required: false
        type: string
      build_output_path:
        description: 'Directory containing generated RTL to package'
        required: false
        type: string
        default: generated_sv_dir
      rtl_target_override:
        description: "Optional: override which make target runs (rtl or lazyrtl). Leave empty to use the repo's own cd.config."
        required: false
        type: string
        default: ''
      ref:
        description: >
          Git ref (branch, tag, or full commit SHA) to check out before generating RTL.
          Defaults to the ref that triggered this workflow. Callers that bump a
          submodule pointer via an automated commit (e.g. a super-repo reacting to
          a dependency's release via repository_dispatch) MUST pass the new commit
          SHA here explicitly -- repository_dispatch pins github.ref to whatever the
          default branch pointed to BEFORE that bump commit was pushed, so leaving
          this at its default would silently build stale RTL against the old
          submodule pointer.
        required: false
        type: string
        default: ${{ github.ref }}
      notify_repo:
        description: >
          Optional org/repo of a super-repo to notify via repository_dispatch after
          a successful release (e.g. "your-org/RedefineIp"). Leave empty to skip
          notification entirely.
        required: false
        type: string
        default: ''
      commit_generated_output:
        description: >
          If true, additionally commit build_output_path directly into this repo
          (on top of still publishing the Release tarball) so generated_sv_dir
          stays up to date in the repo's own tree. Off by default -- opt in per
          caller so this doesn't silently change behavior for repos that only
          want the Release artifact.
        required: false
        type: boolean
        default: false
      push_branch:
        description: >
          Branch to push the commit_generated_output commit to. Defaults to the
          branch that triggered this run, which is correct for direct
          workflow_dispatch callers (e.g. a manual cd.yml run on branch TEST).
          Callers invoked via repository_dispatch (e.g. on-dependency-release.yml's
          regenerate-rtl job) lose branch context entirely -- repository_dispatch
          always runs against the repo's default branch regardless of which
          branch actually released the dependency -- so those callers MUST pass
          this explicitly (typically forwarded from the dispatch payload) rather
          than relying on the default.
        required: false
        type: string
        default: ${{ github.ref_name }}
      playground_repo:
        description: >
          The shared "playground" toolchain repo to check out as a sibling
          directory. Forwarded straight through to setup-toolchain's
          playground-repo input -- see that action for the default.
        required: false
        type: string
        default: ''
    secrets:
      CI_SUBMODULE_PAT0:
        required: false
      RELEASE_TOKEN:
        required: false
      SUPER_REPO_DISPATCH_TOKEN:
        required: false
jobs:
  cd:
    # No event_name guard here: this workflow's only trigger is `workflow_call`,
    # so being invoked at all already means a caller explicitly wants a release.
    # A guard like `github.event_name == 'workflow_dispatch'` would silently skip
    # this job whenever the caller itself was triggered by something else (e.g.
    # on-dependency-release.yml, triggered by repository_dispatch) -- github.event_name
    # reflects the event that started the whole run, not the caller's own `uses:` call.
    runs-on: ubuntu-latest
    environment: production
    concurrency: rtl-release-${{ github.event.repository.name }}
    permissions:
      contents: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          submodules: false
          ref: ${{ inputs.ref }}

      - name: Setup toolchain and resolve dependencies
        uses: shau-08/CICD/.github/actions/setup-toolchain@main
        with:
          submodule-token: ${{ secrets.CI_SUBMODULE_PAT0 }}
          playground-repo: ${{ inputs.playground_repo != '' && inputs.playground_repo || 'shau-08/playground-stub' }}

      - name: Cache Mill compiled output
        uses: actions/cache@v4
        with:
          path: out
          key: mill-out-${{ runner.os }}-${{ github.event.repository.name }}-${{ hashFiles('dependencies/**/*.scala', 'build.sc', 'playground/**/*.scala', 'playground/build.sc') }}
          restore-keys: |
            mill-out-${{ runner.os }}-${{ github.event.repository.name }}-
      - name: Generate RTL
        env:
          JAVA_OPTS: "-Xmx4g -Xss8m"
        run: |
          if [ -n "${{ inputs.rtl_target_override }}" ]; then
            make ${{ inputs.rtl_target_override }}
          else
            make rtl-dispatch
          fi
      - name: Resolve tag name
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            # Use the commit actually checked out (inputs.ref resolved), NOT
            # $GITHUB_SHA -- for a repository_dispatch-triggered caller (e.g. the
            # super-repo's bump-and-regenerate flow), GITHUB_SHA is frozen at
            # whatever commit existed BEFORE the bump commit was pushed, which
            # would silently mislabel the release with the wrong/old short SHA.
            actual_sha=$(git rev-parse HEAD)
            tag="${{ github.event.repository.name }}-${{ github.ref_name }}-$(date +%Y%m%d)-${actual_sha::7}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit generated output
        if: inputs.commit_generated_output == true
        run: |
          set -euo pipefail
          out="${{ inputs.build_output_path }}"

          # generated_sv_dir/* is typically in .gitignore (it's a build output),
          # but files already tracked there stay tracked regardless -- gitignore
          # only blocks *new* untracked paths from `git add`. Plain `git add`
          # would then silently skip any genuinely new filename that shows up in
          # a future run while still updating the already-tracked ones. `-f`
          # forces both new and existing files in, so nothing is dropped.
          git add -f "$out"

          if git diff --cached --quiet; then
            echo "No changes in $out -- skipping commit."
          else
            git config user.name "ci-bot"
            git config user.email "ci-bot@users.noreply.github.com"
            git commit -m "chore: update generated RTL output ($out) for ${{ steps.tag.outputs.tag }}"

            # Push to whichever branch this run is actually meant to represent --
            # NOT the repo's default branch. See push_branch's description above
            # for why this can't just be derived from local git state (HEAD is
            # detached after checkout, and repository_dispatch-triggered callers
            # have no branch context to derive from at all).
            git push origin "HEAD:${{ inputs.push_branch }}"
          fi

      - name: Package RTL
        run: |
          set -euo pipefail
          out="${{ inputs.build_output_path }}"
          if [ ! -d "$out" ] || [ -z "$(find "$out" -name '*.sv' -print -quit)" ]; then
            echo "No .sv files were generated in $out — aborting release."
            exit 1
          fi
          tar -czvf "generated-rtl-${{ steps.tag.outputs.tag }}.tar.gz" "$out/"

      - name: Create or update Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: RTL Release ${{ steps.tag.outputs.tag }}
          files: generated-rtl-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve actually-built commit SHA (for notify payload)
        if: inputs.notify_repo != ''
        id: built_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Notify super-repo of this release
        if: inputs.notify_repo != ''
        env:
          GH_TOKEN: ${{ secrets.SUPER_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SUPER_REPO_DISPATCH_TOKEN }}" ]; then
            echo "::error::notify_repo is set to '${{ inputs.notify_repo }}' but SUPER_REPO_DISPATCH_TOKEN secret is empty — cannot notify. Set the org-wide secret or drop notify_repo."
            exit 1
          fi
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg tag "${{ steps.tag.outputs.tag }}" \
            --arg sha "${{ steps.built_sha.outputs.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            '{event_type: "dependency-released", client_payload: {repo: $repo, tag: $tag, sha: $sha, branch: $branch}}' \
            | gh api "repos/${{ inputs.notify_repo }}/dispatches" --input -
