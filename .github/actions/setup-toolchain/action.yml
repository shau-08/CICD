name: 'Setup Chisel RTL Toolchain'
description: >
  Shared setup used by both CI and CD. Checks out the `playground`
  toolchain repo and resolves BOTH playground's own direct dependencies
  and the calling repo's own direct dependencies/* entries to the latest
  commit on each submodule's real remote default branch -- single level
  only (not recursive into nested .gitmodules), fetched shallow
  (--depth 1). Confirmed directly with the repo owner: both playground's
  and the project's own dependencies should always resolve to latest, not
  whatever's pinned, one level deep.

inputs:
  mill-version:
    description: 'Mill version to fall back to if no .mill-version file is present'
    required: false
    default: '0.11.6'
  firtool-version:
    description: 'firtool version to install'
    required: false
    default: '1.62.1'
  ssh-private-key:
    description: >
      SSH deploy key with read access to private dependency repos (e.g.
      redefine-header). Composite actions can't read the secrets context
      directly, so the caller workflow must pass secrets.CI_SSH_PRIVATE_KEY
      into this input explicitly.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # Must run before ANY step that clones/fetches a private repo --
    # playground itself may be private, and dependencies/* almost
    # certainly includes private repos (confirmed: redefine-header is).
    - name: Configure SSH access for private repos
      if: inputs.ssh-private-key != ''
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Checkout playground (shared toolchain)
      uses: actions/checkout@v4
      with:
        repository: morphingmachines/playground
        path: playground
        fetch-depth: 1
        ssh-key: ${{ inputs.ssh-private-key }}

    # actions/checkout's `path` can only place a repo UNDER
    # $GITHUB_WORKSPACE (confirmed: not officially supported to escape it
    # with `../`), so the step above lands playground at
    # <calling-repo>/playground -- nested inside the calling repo's own
    # checkout. But every project repo's Makefile (mmu, cr_ni, etc.)
    # references it as a SIBLING: `-include ./../playground/Makefile.include`.
    # Verified: with the nested layout, that `-include` silently finds
    # nothing (a leading `-` suppresses the missing-file error), which
    # surfaces later as a confusing "No rule to make target
    # 'check-verilator'" instead of a clear path error.
    # This symlink makes ../playground resolve correctly from the calling
    # repo's root without needing to fight actions/checkout's own
    # workspace restriction.
    - name: Make playground resolvable as a sibling directory (../playground)
      shell: bash
      run: ln -s "$GITHUB_WORKSPACE/playground" "$(dirname "$GITHUB_WORKSPACE")/playground"

    # Fails fast with ONE clear message instead of letting git retry-and-fail
    # separately for every git@github.com: submodule below (which is
    # confusing to read and slower to diagnose).
    - name: Warn early if SSH-auth submodules exist but no key was provided
      shell: bash
      run: |
        if [ -z "${{ inputs.ssh-private-key }}" ]; then
          if grep -q 'git@github.com:' playground/.gitmodules 2>/dev/null || grep -q 'git@github.com:' .gitmodules 2>/dev/null; then
            echo "ERROR: one or more submodules use an SSH (git@github.com:) URL," >&2
            echo "but no ssh-private-key was provided to this action. Confirm" >&2
            echo "CI_SSH_PRIVATE_KEY is set as a repo or org Actions secret." >&2
            exit 1
          fi
        fi

    # TEMPORARY WORKAROUND -- remove once playground/.gitmodules is fixed
    # upstream. playground/.gitmodules currently pins rocket-chip to
    # `branch = dev`, which does not exist on morphingmachines/rocket-chip
    # (only `master` and `devMM` do) -- this made the generic --remote
    # step below fail with "Unable to find refs/remotes/origin/dev".
    # Setting the override HERE, in local git config, takes precedence
    # over playground/.gitmodules for the following step, without ever
    # writing back to playground's own committed .gitmodules -- so this
    # needs no write access to playground and no admin sign-off to ship.
    # Confirmed with repo owner: use `master`, not `devMM`, for now.
    #
    # IMPORTANT: `git config submodule.<X>.branch` is keyed by the
    # submodule's declared NAME (the string in `[submodule "..."]`),
    # NOT its path. playground/.gitmodules declares this one as
    # `[submodule "rocket-chip"]` with `path = dependencies/rocket-chip`
    # -- name and path differ here (confirmed directly from the real
    # .gitmodules; the same file also has an unrelated orphaned
    # `[submodule "dependencies/rocket-chip"]` block with no path/url,
    # which is dead config, not the real submodule -- do not key on it).
    # Keying this override on the path instead of the name silently
    # targets nothing and reproduces the exact same failure with zero
    # error indicating the override didn't apply -- verified this
    # exact failure mode before landing on the fix below.
    - name: Override stale branch pin for rocket-chip (temporary, until playground/.gitmodules is fixed upstream)
      shell: bash
      working-directory: playground
      run: git config submodule.rocket-chip.branch master

    # Single level only, per direction confirmed with the repo owner: NOT
    # recursive into nested .gitmodules. Both playground's own direct
    # dependencies and this repo's own direct dependencies/ entries get
    # updated to the latest commit on their tracked branch (--remote,
    # ignoring whatever SHA is pinned in the parent's tree), fetched
    # shallow (--depth 1). Works for whatever a given repo declares in
    # its own .gitmodules -- nothing here is hardcoded to specific names.
    # Deliberately does NOT rewrite SSH URLs to HTTPS -- that broke
    # private-repo access entirely; the ssh-agent step above handles auth
    # for both public and private submodules uniformly.
    - name: Update playground's submodules (latest commit, depth 1, non-recursive)
      shell: bash
      working-directory: playground
      run: git submodule update --init --remote --depth 1

    - name: Update this repo's submodules (latest commit, depth 1, non-recursive)
      shell: bash
      run: git submodule update --init --remote --depth 1

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache Mill dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.ivy2/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}
        restore-keys: |
          ${{ runner.os }}-mill-

    - name: Install Mill
      shell: bash
      run: |
        set -euo pipefail
        curl -L https://raw.githubusercontent.com/lefou/millw/main/millw > mill
        chmod +x mill
        sudo mv mill /usr/local/bin/mill
        if [ ! -f .mill-version ]; then
          echo "${{ inputs.mill-version }}" > .mill-version
        fi
        if [ ! -f playground/.mill-version ]; then
          echo "${{ inputs.mill-version }}" > playground/.mill-version
        fi

    - name: Cache firtool
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/firtool
        key: firtool-${{ inputs.firtool-version }}

    - name: Install firtool
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v firtool &> /dev/null; then
          wget -q https://github.com/llvm/circt/releases/download/firtool-${{ inputs.firtool-version }}/firrtl-bin-linux-x64.tar.gz
          tar -xzf firrtl-bin-linux-x64.tar.gz
          sudo mv firtool-${{ inputs.firtool-version }}/bin/firtool /usr/local/bin/firtool
          sudo chmod +x /usr/local/bin/firtool
        fi
        firtool --version

    # Was an open question in earlier discussion (mmu's `test` target
    # depends on check-verilator, cr_ni's `check`/verilate path does too)
    # -- not confirmed preinstalled on GitHub-hosted runners, so installing
    # explicitly here rather than assuming.
    - name: Install verilator
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v verilator &> /dev/null; then
          sudo apt-get update -qq
          sudo apt-get install -y verilator
        fi
        verilator --version

    # Mill's location varies by repo: some rely on the sibling
    # playground/mill; others (e.g. cr_ni) commit their own ./mill
    # directly. Handles both without needing to know in advance which
    # style a given repo uses, and never clobbers a repo's own committed
    # launcher.
    - name: Ensure a Mill launcher is available where this repo expects it
      shell: bash
      run: |
        set -euo pipefail
        if [ -f ./mill ]; then
          chmod +x ./mill
          echo "Using this repo's own committed ./mill"
        elif [ -f playground/mill ]; then
          chmod +x playground/mill
          echo "Using sibling playground/mill (no ./mill committed in this repo)"
        else
          echo "ERROR: no mill launcher found at ./mill or playground/mill" >&2
          exit 1
        fi
