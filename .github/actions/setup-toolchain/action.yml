name: 'Setup Chisel RTL Toolchain'
description: >
  Shared setup used by both CI and CD. Checks out the `playground`
  toolchain repo and initializes BOTH playground's own direct
  dependencies and the calling repo's own direct dependencies/*
  entries at whatever commit is already pinned (NOT --remote/latest),
  one level only -- nested submodules (e.g. chipyard's own firrtl2
  submodule) are initialized via explicit, individually-scoped steps
  below rather than --recursive, so we never pull in submodules we
  don't actually need.

inputs:
  mill-version:
    description: 'Mill version to fall back to if no .mill-version file is present'
    required: false
    default: '0.11.6'
  firtool-version:
    description: 'firtool version to install'
    required: false
    default: '1.62.1'
  verilator-version:
    description: >
      Exact verilator version to build and install. Must match whatever
      version playground/Makefile.include's check-verilator target
      expects -- confirmed via a real CI failure that this check is
      exact-match, not >=.
    required: false
    default: '5.012'
  playground-repo:
    description: >
      The shared "playground" toolchain repo to check out as a sibling
      directory. Defaults to the stub used for dry-run testing -- real
      callers must override this with the actual org/repo (e.g.
      "your-org/playground") once that's known.
    required: false
    default: 'shau-08/playground-stub'
  submodule-token:
    description: >
      Personal access token (Contents: Read-only, scoped to this repo and
      every dependencies/* submodule repo) used to read private submodules
      over HTTPS. Composite actions can't read the secrets context
      directly, so the caller workflow must pass secrets.CI_SUBMODULE_PAT0
      into this input explicitly.

      Replaces the earlier SSH-deploy-key approach: rather than adding a
      deploy key to every dependency repo individually, this rewrites
      git@github.com: submodule URLs to authenticated HTTPS at the git
      config level, so .gitmodules itself never needs to change.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:

    - name: Configure git to use PAT for SSH-style submodule URLs
      if: inputs.submodule-token != ''
      shell: bash
      run: |
        set -euo pipefail
        git config --global url."https://x-access-token:${{ inputs.submodule-token }}@github.com/".insteadOf "git@github.com:"

    - name: Checkout playground (shared toolchain)
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.playground-repo }}
        path: playground
        fetch-depth: 1
        token: ${{ inputs.submodule-token || github.token }}

    - name: Make playground resolvable as a sibling directory (../playground)
      shell: bash
      run: ln -s "$GITHUB_WORKSPACE/playground" "$(dirname "$GITHUB_WORKSPACE")/playground"

    - name: Warn early if SSH-auth submodules exist but no token was provided
      shell: bash
      run: |
        if [ -z "${{ inputs.submodule-token }}" ]; then
          if grep -q 'git@github.com:' playground/.gitmodules 2>/dev/null || grep -q 'git@github.com:' .gitmodules 2>/dev/null; then
            echo "ERROR: one or more submodules use an SSH (git@github.com:) URL," >&2
            echo "but no submodule-token was provided to this action. Confirm" >&2
            echo "CI_SUBMODULE_PAT0 is set as a repo or org Actions secret." >&2
            exit 1
          fi
        fi

    - name: Update playground's submodules (pinned commit, one level, no --remote)
      shell: bash
      working-directory: playground
      run: git submodule update --init --depth 1

    - name: Update this repo's submodules (pinned commit, one level, no --remote)
      shell: bash
      run: git submodule update --init --depth 1

    - name: Warn if any of this repo's submodule dependencies are behind their remote branch
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f .gitmodules ]; then
          echo "No .gitmodules in this repo — nothing to check."
        exit 0
        fi
        git submodule foreach '
        pinned=$(git rev-parse HEAD)
        pinned_short=$(echo "$pinned" | cut -c1-7)
        branch=$(git config -f "$toplevel/.gitmodules" "submodule.$name.branch" 2>/dev/null || echo main)
        latest=$(git ls-remote origin "refs/heads/$branch" 2>/dev/null | cut -f1)
        latest_short=$(echo "$latest" | cut -c1-7)
        if [ -n "$latest" ] && [ "$pinned" != "$latest" ]; then
          echo "::warning::Submodule $name is pinned to $pinned_short, but latest on $branch is $latest_short. Using pinned commit as specified."
        else
          echo "Submodule $name is at latest commit ($pinned_short)."
        fi
        '

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache Mill dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.ivy2/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}
        restore-keys: |
          ${{ runner.os }}-mill-

    - name: Install Mill
      shell: bash
      run: |
        set -euo pipefail
        curl -L https://raw.githubusercontent.com/lefou/millw/main/millw > mill
        chmod +x mill
        sudo mv mill /usr/local/bin/mill
        if [ ! -f .mill-version ]; then
          echo "${{ inputs.mill-version }}" > .mill-version
        fi
        if [ ! -f playground/.mill-version ]; then
          echo "${{ inputs.mill-version }}" > playground/.mill-version
        fi

    - name: Cache firtool
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/firtool
        key: firtool-${{ inputs.firtool-version }}

    - name: Install firtool
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v firtool &> /dev/null; then
          wget -q https://github.com/llvm/circt/releases/download/firtool-${{ inputs.firtool-version }}/firrtl-bin-linux-x64.tar.gz
          tar -xzf firrtl-bin-linux-x64.tar.gz
          sudo mv firtool-${{ inputs.firtool-version }}/bin/firtool /usr/local/bin/firtool
          sudo chmod +x /usr/local/bin/firtool
        fi
        firtool --version

    - name: Cache verilator build
      uses: actions/cache@v4
      id: verilator-cache
      with:
        path: /opt/verilator-${{ inputs.verilator-version }}
        key: verilator-${{ inputs.verilator-version }}-${{ runner.os }}

    - name: Build verilator (exact pinned version, only runs on cache miss)
      if: steps.verilator-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison \
          libfl2 libfl-dev zlib1g zlib1g-dev
        git clone --depth 1 --branch v${{ inputs.verilator-version }} https://github.com/verilator/verilator.git /tmp/verilator-src
        cd /tmp/verilator-src
        autoconf
        ./configure --prefix=/opt/verilator-${{ inputs.verilator-version }}
        make -j"$(nproc)"
        sudo make install

    - name: Add verilator to PATH
      shell: bash
      run: |
        echo "/opt/verilator-${{ inputs.verilator-version }}/bin" >> "$GITHUB_PATH"

    - name: Verify verilator version
      shell: bash
      run: verilator --version

    - name: Ensure a Mill launcher is available where this repo expects it
      shell: bash
      run: |
        set -euo pipefail
        if [ -f ./mill ]; then
          chmod +x ./mill
          echo "Using this repo's own committed ./mill"
        elif [ -f playground/mill ]; then
          chmod +x playground/mill
          echo "Using sibling playground/mill (no ./mill committed in this repo)"
        else
          echo "ERROR: no mill launcher found at ./mill or playground/mill" >&2
          exit 1
        fi
