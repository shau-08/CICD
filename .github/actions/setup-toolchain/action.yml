name: 'Setup Chisel RTL Toolchain'
description: >
  Shared setup used by both CI and CD. Checks out the pinned `playground`
  toolchain repo, installs Java/Mill/firtool, and resolves the calling
  repo's own dependencies/* submodules to the latest commit on each
  submodule's real remote default branch — ignoring any branch= override
  baked into .gitmodules, since that goes stale.

inputs:
  mill-version:
    description: 'Mill version to fall back to if no .mill-version file is present'
    required: false
    default: '0.11.6'
  firtool-version:
    description: 'firtool version to install'
    required: false
    default: '1.62.1'
  verilator-version:
    description: 'verilator git tag to build and install (must match what playground/Makefile.include checks for)'
    required: false
    default: 'v5.012'
  repo-path:
    description: 'Path the caller repo was checked out to, relative to workspace root'
    required: false
    default: 'repo'

runs:
  using: 'composite'
  steps:
    - name: Checkout playground (pinned shared toolchain)
      uses: actions/checkout@v4
      with:
        repository: morphingmachines/playground
        path: playground
        fetch-depth: 1

    - name: Cache playground submodules
      id: playground-cache
      uses: actions/cache@v4
      with:
        path: playground/dependencies
        key: playground-deps-${{ hashFiles('playground/.gitmodules') }}

    - name: Fix SSH URLs and fetch playground submodules (pinned, not always-latest)
      if: steps.playground-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: playground
      env:
        GIT_TERMINAL_PROMPT: "0"
      run: |
        set -euo pipefail
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
        git submodule sync --recursive
        # Not --recursive: only fetch playground's direct submodules (e.g.
        # chipyard itself), not chipyard's own huge nested submodule tree,
        # which the Makefiles here don't actually touch.
        git submodule update --init --depth=1

    - name: Resolve this repo's dependency tree to latest default-branch HEAD (recursive)
      shell: bash
      env:
        GIT_TERMINAL_PROMPT: "0"
      run: |
        set -euo pipefail
        git config --global url."https://github.com/".insteadOf "git@github.com:"

        # TODO: private submodules (e.g. redefine-header) need a credential
        # wired in here before this fetch will succeed against them —
        # either an SSH deploy key (webfactory/ssh-agent, fed from
        # inputs.deploy-key) or an HTTPS PAT via url.insteadOf rewrite.
        # GIT_TERMINAL_PROMPT=0 above means an unauthenticated fetch now
        # fails fast instead of hanging, but it still needs real auth
        # wired in to actually succeed against private repos.

        resolve_submodules() {
          local root="$1"
          if [ ! -f "$root/.gitmodules" ]; then
            return 0
          fi

          git -C "$root" submodule sync --recursive
          git -C "$root" submodule update --init --depth=1

          for path in $(git config -f "$root/.gitmodules" --get-regexp '\.path$' | awk '{print $2}'); do
            full="$root/$path"
            echo "::group::Resolving $full"
            if ! git -C "$full" fetch --depth=1 origin; then
              echo "Failed to fetch $full — likely missing auth for a private repo (see TODO above)." >&2
              exit 1
            fi
            # ls-remote --symref is a single lightweight query, unlike
            # `git remote show origin` which does a full, slow handshake.
            default_branch=$(git -C "$full" ls-remote --symref origin HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2}')
            if [ -z "$default_branch" ]; then
              echo "Could not determine default branch for $full" >&2
              exit 1
            fi
            echo "Forcing $full to origin/${default_branch} (ignoring any branch= pin in .gitmodules)"
            git -C "$full" checkout -f "origin/${default_branch}"
            echo "::endgroup::"

            # Recurse into whatever this submodule itself depends on —
            # the tree goes to different depths per repo (e.g. mmu ->
            # emitrtl -> emitrtl's own deps, vs. mmu -> redefine-header,
            # a leaf with no further .gitmodules).
            resolve_submodules "$full"
          done
        }

        resolve_submodules "${{ inputs.repo-path }}"

    - name: Debug - show resolved dependency tree
      shell: bash
      run: |
        echo "--- ${{ inputs.repo-path }}/dependencies ---"
        find "${{ inputs.repo-path }}/dependencies" -maxdepth 3 2>/dev/null || echo "(no dependencies dir)"
        echo "--- contents check ---"
        for d in "${{ inputs.repo-path }}"/dependencies/*/; do
          name=$(basename "$d")
          count=$(find "$d" -type f 2>/dev/null | wc -l)
          echo "$name: $count files"
        done

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache Mill dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.ivy2/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}
        restore-keys: |
          ${{ runner.os }}-mill-

    - name: Install Mill
      shell: bash
      run: |
        set -euo pipefail
        curl -L https://raw.githubusercontent.com/lefou/millw/main/millw > mill
        chmod +x mill
        sudo mv mill /usr/local/bin/mill
        if [ ! -f "${{ inputs.repo-path }}/.mill-version" ]; then
          echo "${{ inputs.mill-version }}" > "${{ inputs.repo-path }}/.mill-version"
        fi
        if [ ! -f playground/.mill-version ]; then
          echo "${{ inputs.mill-version }}" > playground/.mill-version
        fi

    - name: Cache firtool
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/firtool
        key: firtool-${{ inputs.firtool-version }}

    - name: Install firtool
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v firtool &> /dev/null; then
          wget -q https://github.com/llvm/circt/releases/download/firtool-${{ inputs.firtool-version }}/firrtl-bin-linux-x64.tar.gz
          tar -xzf firrtl-bin-linux-x64.tar.gz
          sudo mv firtool-${{ inputs.firtool-version }}/bin/firtool /usr/local/bin/firtool
          sudo chmod +x /usr/local/bin/firtool
        fi
        firtool --version

    - name: Cache verilator build
      id: verilator-cache
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/bin/verilator*
          /usr/local/share/verilator
        key: verilator-${{ inputs.verilator-version }}

    - name: Build and install verilator
      # apt's verilator is whatever Ubuntu's repo currently ships, which
      # does NOT match the exact version playground/Makefile.include's
      # check-verilator enforces (Verilator 5.012 2023-06-13 rev v5.012).
      # Build the pinned tag from source instead, same pin-and-cache
      # pattern as firtool above.
      shell: bash
      run: |
        set -euo pipefail
        if command -v verilator &> /dev/null && verilator --version | grep -q "${{ inputs.verilator-version }}"; then
          verilator --version
          exit 0
        fi
        sudo apt-get update -y
        sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison \
          ccache libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
        git clone --depth=1 --branch "${{ inputs.verilator-version }}" https://github.com/verilator/verilator.git /tmp/verilator-src
        cd /tmp/verilator-src
        autoconf
        ./configure
        make -j"$(nproc)"
        sudo make install
        verilator --version
